name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          pip install -r backend/requirements.txt
          pip install ruff

      - name: Ruff (backend)
        run: ruff check backend

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: TypeScript type check (frontend)
        working-directory: frontend
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          pip install -r backend/requirements.txt
          pip install pytest "httpx<0.28"

      - name: Pytest unit (backend)
        run: pytest tests/unit -v

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Vitest (frontend)
        working-directory: frontend
        run: npm test

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov "httpx<0.28"

      - name: Pytest integration with coverage (backend)
        run: pytest tests/integration --cov=backend --cov-report=term-missing
