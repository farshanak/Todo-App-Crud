[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["backend"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--strict-markers --tb=short"
markers = [
    "unit: Pure logic tests (no I/O)",
    "integration: Component integration tests",
]

[tool.coverage.run]
source = ["backend"]
omit = ["backend/__pycache__/*", "backend/*test*"]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_covered = false
